meta:
  name: vehiculos-agent-llm
  version: 1.0.0
  description: Configuración del LLM y memoria del agente vendedor de vehículos en Telegram.
  updated_at: 2026-05-22
  author: kinofuente@ariaia.com

llm:
  provider: openai
  model: gpt-4.1
  temperature: 0.6
  # max_tokens: null
  # top_p: 1
  # timeout: 60

memory:
  # Memoria persistente en PostgreSQL (Supabase). La conexión se construye
  # desde las variables DB_USER, DB_PASSWORD, DB_HOST, DB_PORT, DB_NAME del .env.
  token_limit: 3000
  table_name: chat_history_llamaindex_vehiculos
